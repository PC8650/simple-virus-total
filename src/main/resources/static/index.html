<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Threat Intel | VirusTotal 深度分析</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- 控制面板 -->
        <aside class="sidebar">

            <form id="scanForm">
                <div class="form-group">
                    <label for="type" data-i18n="typeLabel">分析类型</label>
                    <select id="type" name="type" required>
                        <option value="FILE" data-i18n="typeFile">文件分析 (FILE)</option>
                        <option value="URL" data-i18n="typeUrl">网址分析 (URL)</option>
                        <option value="IP" data-i18n="typeIp">IP 地址分析 (IP)</option>
                        <option value="DOMAIN" data-i18n="typeDomain">域名分析 (DOMAIN)</option>
                    </select>
                </div>

                <!-- 动态输入区 -->
                <div id="payloadGroup" class="form-group hidden">
                    <label for="payload" data-i18n="payloadLabel">载荷 (URL/IP/Domain)</label>
                    <input type="text" id="payload" name="payload" placeholder="请输入分析目标..."
                        data-i18n-placeholder="payloadPlaceholder">
                </div>

                <div id="fileGroup" class="form-group">
                    <label data-i18n="fileLabel">目标文件</label>
                    <div class="custom-file-upload">
                        <label for="file" class="file-btn" data-i18n="selectFileBtn">选择文件</label>
                        <span id="fileName" class="file-name" data-i18n="noFileChosen">未选择任何文件</span>
                        <input type="file" id="file" name="file" class="hidden-input">
                    </div>
                </div>

                <div id="pwdGroup" class="form-group">
                    <label for="pwd" data-i18n="pwdLabel">压缩包密码 (可选)</label>
                    <input type="password" id="pwd" name="pwd" placeholder="若为加密压缩包请填写..."
                        data-i18n-placeholder="pwdPlaceholder">
                </div>

                <div class="form-group">
                    <label for="description" data-i18n="descLabel">补充说明 (AI 专家背景上下文)</label>
                    <textarea id="description" name="description" rows="3" placeholder="例如：该文件来自可疑邮件，重点关注内嵌宏..."
                        data-i18n-placeholder="descPlaceholder"></textarea>
                </div>


                <div class="form-group">
                    <label for="language" data-i18n="langLabel">报告语言</label>
                    <select id="language" name="language">
                        <option value="zh-CN">简体中文</option>
                        <option value="en-US">English</option>
                    </select>
                </div>

                <button type="submit" id="submitBtn" class="btn-scan">
                    <span id="btnText" data-i18n="btnStart">立即启动分析</span>
                    <div id="loader" class="hidden">...</div>
                </button>
            </form>
        </aside>

        <!-- 分析实况 -->
        <main class="main-content">
            <div id="logContainer" class="log-container">
                <!-- 初始状态 -->
                <div class="node-section">
                    <div class="node-header" data-i18n="sysReady">系统准备就绪</div>
                    <div class="log-entry non-main" data-i18n="sysWait">等待输入指令以启动 AI 威胁分析流...</div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
